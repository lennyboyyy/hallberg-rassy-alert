name: Check Boat Listings

on:
  workflow_dispatch: # Triggered by cron-job.org every 15 minutes

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run boat checker
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "Boat Alert Bot"
          git config user.email "bot@hallberg-rassy-alert"
          git add seen_listings.json
          git diff --staged --quiet || git commit -m "Update seen listings [skip ci]"
          git push
